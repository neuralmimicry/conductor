server:
  bind_addr: "0.0.0.0:8091"
  public_base_url: "${CONDUCTOR_PUBLIC_BASE_URL}"
  dashboard_title: "NeuralMimicry Conductor"

security:
  admin_token: "${CONDUCTOR_ADMIN_TOKEN}"
  allow_dashboard_without_token: false

storage:
  root_dir: "data"

database:
  url: "${CONDUCTOR_DATABASE_URL}"
  max_connections: 10
  run_migrations: true

discovery:
  ansible_root: "/home/pbisaacs/Developer/swarmhpc/swarmhpc/ansible"
  local_repo_root: "/home/pbisaacs/Developer/neuralmimicry"
  refresh_interval_seconds: 180
  probe_services: true
  service_timeout_seconds: 5
  github:
    enabled: true
    api_base_url: "https://api.github.com"
    owner: "neuralmimicry"
    token: "${GITHUB_TOKEN}"
    timeout_seconds: 10
    max_repositories: 200
  repo_hints:
    conductor_repo: "/home/pbisaacs/Developer/neuralmimicry/conductor"
    gail_repo: "/home/pbisaacs/Developer/neuralmimicry/gail"
    tracey_repo: "/home/pbisaacs/Developer/neuralmimicry/tracey"
    continuum_repo: "/home/pbisaacs/Developer/neuralmimicry/nmc"
    refiner_repo: "/home/pbisaacs/Developer/neuralmimicry/rag_demo"
    aarnn_repo: "/home/pbisaacs/Developer/neuralmimicry/aarnn_rust"

delivery:
  auto_advance: true
  dora_window_days: 30
  require_uat_before_production: true
  production_canary_percentage: 10

integrations:
  gail:
    enabled: true
    base_url: "${GAIL_BASE_URL}"
    bearer_token: "${GAIL_BEARER_TOKEN}"
    timeout_seconds: 10
  tracey:
    enabled: true
    base_url: "${TRACEY_BASE_URL}"
    bearer_token: "${TRACEY_BEARER_TOKEN}"
    timeout_seconds: 5
  continuum:
    enabled: true
    base_url: "${CONTINUUM_BASE_URL}"
    bearer_token: "${CONTINUUM_BEARER_TOKEN}"
    timeout_seconds: 5
  refiner:
    enabled: true
    base_url: "${REFINER_BASE_URL}"
    bearer_token: "${REFINER_BEARER_TOKEN}"
    username: "${REFINER_USERNAME}"
    password: "${REFINER_PASSWORD}"
    timeout_seconds: 10
  aarnn:
    enabled: true
    base_url: "${AARNN_BASE_URL}"
    bearer_token: "${AARNN_BEARER_TOKEN}"
    timeout_seconds: 10

planning:
  refresh_interval_seconds: 240
  auto_queue: true
  gail_workflow: "conductor_improvement_planner"
  minimum_priority: 40

execution:
  enabled: true
  dry_run: false
  emergency_stop: false
  refresh_interval_seconds: 120
  poll_interval_seconds: 5
  job_timeout_seconds: 900
  claim_ttl_seconds: 1200
  max_concurrent_executions: 1
  instance_id: "${CONDUCTOR_INSTANCE_ID}"
  use_local_project_root: true
  refiner_workflow: "project_solver"
  token_scope: "personal"
  llm_provider: "${CONDUCTOR_LLM_PROVIDER}"
  llm_model: "${CONDUCTOR_LLM_MODEL}"
  coding_agent: "${CONDUCTOR_CODING_AGENT}"

policy:
  enabled: true
  require_admin_approval: true
  require_verification: true
  require_refiner_strict_mode: true
  allow_external_repo_execution: true
  protected_services:
    - "gail"
    - "refiner"
    - "aarnn"
  protected_repo_roots:
    - "/home/pbisaacs/Developer/neuralmimicry/gail"
    - "/home/pbisaacs/Developer/neuralmimicry/tracey"
    - "/home/pbisaacs/Developer/neuralmimicry/nmc"
    - "/home/pbisaacs/Developer/neuralmimicry/rag_demo"
    - "/home/pbisaacs/Developer/neuralmimicry/aarnn_rust"
  blocked_action_keywords:
    - "reset --hard"
    - "rm -rf"
    - "wipe"
    - "destroy"

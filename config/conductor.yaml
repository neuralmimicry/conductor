server:
  bind_addr: "0.0.0.0:8091"
  public_base_url: "${CONDUCTOR_PUBLIC_BASE_URL}"
  dashboard_title: "NeuralMimicry Conductor"

security:
  admin_token: "${CONDUCTOR_ADMIN_TOKEN}"
  allow_dashboard_without_token: false

storage:
  root_dir: "data"

database:
  url: "${CONDUCTOR_DATABASE_URL}"
  max_connections: 10
  run_migrations: true

discovery:
  ansible_root: "${CONDUCTOR_ANSIBLE_ROOT}"
  local_repo_root: "${CONDUCTOR_LOCAL_REPO_ROOT}"
  refresh_interval_seconds: 180
  probe_services: true
  service_timeout_seconds: 5
  github:
    enabled: true
    api_base_url: "https://api.github.com"
    owner: "neuralmimicry"
    token: "${GITHUB_TOKEN}"
    timeout_seconds: 10
    max_repositories: 200
  repo_hints:
    conductor_repo: "${CONDUCTOR_REPO_HINT_CONDUCTOR}"
    gail_repo: "${CONDUCTOR_REPO_HINT_GAIL}"
    tracey_repo: "${CONDUCTOR_REPO_HINT_TRACEY}"
    continuum_repo: "${CONDUCTOR_REPO_HINT_CONTINUUM}"
    refiner_repo: "${CONDUCTOR_REPO_HINT_REFINER}"
    aarnn_repo: "${CONDUCTOR_REPO_HINT_AARNN}"

delivery:
  auto_advance: true
  dora_window_days: 30
  require_uat_before_production: true
  production_canary_percentage: 10

validation:
  enabled: true
  require_success: true
  allow_missing_tooling: true
  timeout_seconds: 600
  max_output_bytes: 4096
  max_commands: 6

self_test:
  enabled: true
  refresh_interval_seconds: 900
  auto_queue_regression_work_item: true

integrations:
  # NeuralMimicry service bearer tokens should be Customers-issued service-account tokens.
  gail:
    enabled: true
    base_url: "${GAIL_BASE_URL}"
    bearer_token: "${GAIL_BEARER_TOKEN}"
    timeout_seconds: 10
  tracey:
    enabled: true
    base_url: "${TRACEY_BASE_URL}"
    bearer_token: "${TRACEY_BEARER_TOKEN}"
    timeout_seconds: 5
    sync_interval_seconds: 300
  continuum:
    enabled: true
    base_url: "${CONTINUUM_BASE_URL}"
    bearer_token: "${CONTINUUM_BEARER_TOKEN}"
    timeout_seconds: 5
  refiner:
    enabled: true
    base_url: "${REFINER_BASE_URL}"
    bearer_token: "${REFINER_BEARER_TOKEN}"
    # Only use username/password when a first-party human login flow is explicitly required.
    username: "${REFINER_USERNAME}"
    password: "${REFINER_PASSWORD}"
    timeout_seconds: 10
    sync_interval_seconds: 300
  aarnn:
    enabled: true
    base_url: "${AARNN_BASE_URL}"
    bearer_token: "${AARNN_BEARER_TOKEN}"
    timeout_seconds: 10
  grafana:
    enabled: true
    base_url: "${GRAFANA_BASE_URL}"
    bearer_token: "${GRAFANA_BEARER_TOKEN}"
    username: "${GRAFANA_USERNAME}"
    password: "${GRAFANA_PASSWORD}"
    timeout_seconds: 10
  prometheus:
    enabled: true
    base_url: "${PROMETHEUS_BASE_URL}"
    bearer_token: "${PROMETHEUS_BEARER_TOKEN}"
    username: "${PROMETHEUS_USERNAME}"
    password: "${PROMETHEUS_PASSWORD}"
    timeout_seconds: 10
  postgres:
    enabled: true
    connection_string: "${POSTGRES_CONNECTION_STRING}"
    timeout_seconds: 5
  shared_storage:
    enabled: true
    mount_path: "${SHARED_STORAGE_MOUNT_PATH}"
  atlassian:
    enabled: true
    base_url: "${ATLASSIAN_BASE_URL}"
    username: "${ATLASSIAN_USERNAME}"
    api_token: "${ATLASSIAN_API_TOKEN}"
    timeout_seconds: 20
    sync_interval_seconds: 600
    jira_project_key: "${ATLASSIAN_JIRA_PROJECT_KEY}"
    jira_issue_type: "Task"
    confluence_space_key: "${ATLASSIAN_CONFLUENCE_SPACE_KEY}"
    confluence_parent_page_id: "${ATLASSIAN_CONFLUENCE_PARENT_PAGE_ID}"

planning:
  refresh_interval_seconds: 240
  auto_queue: true
  gail_workflow: "conductor_improvement_planner"
  minimum_priority: 40

execution:
  enabled: true
  dry_run: false
  emergency_stop: false
  refresh_interval_seconds: 120
  poll_interval_seconds: 5
  job_timeout_seconds: 900
  claim_ttl_seconds: 1200
  max_concurrent_executions: 1
  instance_id: "${CONDUCTOR_INSTANCE_ID}"
  use_local_project_root: true
  refiner_workflow: "project_solver"
  token_scope: "personal"
  llm_provider: "${CONDUCTOR_LLM_PROVIDER}"
  llm_model: "${CONDUCTOR_LLM_MODEL}"
  coding_agent: "${CONDUCTOR_CODING_AGENT}"

policy:
  enabled: true
  require_admin_approval: true
  require_verification: true
  require_refiner_strict_mode: true
  allow_external_repo_execution: true
  require_successful_github_actions_for_production: true
  github_actions_workflow_file: "ci.yml"
  ai_approvals_enabled: true
  ai_approval_interval_seconds: 60
  ai_approval_workflow: "conductor_safe_approval"
  ai_approval_min_confidence: 0.7
  ai_approval_max_items_per_cycle: 20
  protected_services:
    - "conductor"
    - "gail"
    - "refiner"
    - "aarnn"
    - "swarmhpc"
  protected_repo_roots: []
  blocked_action_keywords:
    - "reset --hard"
    - "rm -rf"
    - "wipe"
    - "destroy"
